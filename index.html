<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Integración por Sustitución - Completa</title>
    <style>
        /* Fondo Animado con gradiente en movimiento (Tonos Azules) */
        @keyframes fondoAnimado {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #001f3f, #0074d9, #7fdbff, #001122);
            background-size: 400% 400%;
            animation: fondoAnimado 12s ease infinite;
            color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background-color: rgba(214, 234, 248, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            max-width: 650px;
            width: 90%;
            border: 3px solid #000000;
        }

        /* Botones Verde Claro con sombra sólida de interfaz limpia */
        button, select {
            background-color: #2ecc71;
            color: #000000;
            border: 3px solid #000000;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px;
            box-shadow: 0 4px 0 #000000;
        }

        select {
            background-color: #ffffff;
            padding: 10px 20px;
            font-size: 1.1rem;
        }

        button:hover {
            background-color: #58d68d;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #000000;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000000;
        }

        /* Pantallas */
        .screen {
            display: none;
        }

        .active {
            display: block;
        }

        /* Pantalla de Inicio */
        #inicio h1 {
            font-size: 3.2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff;
        }

        /* Contenedor matemático */
        .opcion-bloque {
            background-color: rgba(255, 255, 255, 0.5);
            padding: 35px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px dashed #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .simbolo-integral {
            font-size: 4.5rem;
            font-family: 'Times New Roman', Times, serif;
        }

        .texto-matematico {
            font-size: 2.2rem;
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
        }

        /* CUADRO DE TEXTO LARGO (Operación Libre) */
        .input-unico-largo {
            width: 320px;
            height: 70px;
            font-size: 1.8rem;
            border: 3px solid #000000;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            background-color: #ffffff;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.15);
            font-family: 'Segoe UI', sans-serif;
        }

        /* CUADROS INDEPENDIENTES (Estructura de División) */
        .input-fraccion-libre {
            width: 220px;
            height: 65px;
            font-size: 1.8rem;
            border: 3px solid #000000;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            background-color: #ffffff;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.15);
        }

        /* Diseño de Fracción Limpia */
        .contenedor-fraccion {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
        }

        .fila-numerador { padding-bottom: 10px; }
        .fila-denominador { padding-top: 10px; }

        .linea-fraccion {
            width: 105%;
            height: 4px;
            background-color: #000000;
            border-radius: 2px;
        }

        /* Bloque del cambio de variable */
        .tabla-sustitucion {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 15px 0;
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #000000;
            text-align: left;
        }

        .variable-linea {
            padding: 4px 8px;
            background: #ffffff;
            border-left: 4px solid #2ecc71;
            font-weight: bold;
        }

        /* Contenedor de Resultados */
        #resultado-box {
            margin-top: 25px;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            border: 3px solid #000000;
            text-align: left;
            display: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        #resultado-box h3 {
            margin-top: 0;
            border-bottom: 2px dashed #000000;
            padding-bottom: 8px;
            text-transform: uppercase;
        }

        .paso {
            margin-bottom: 14px;
            font-size: 1.15rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="inicio" class="screen active">
            <h1>INTEGRAL POR SUSTITUCIÓN</h1>
            <button id="btn-comenzar">Calcular ya</button>
        </div>

        <div id="calculadora" class="screen">
            <h2 style="font-size: 1.5rem; text-transform: uppercase;">Nivel Bachillerato Sustitución</h2>
            
            <div style="margin-bottom: 25px;">
                <label style="font-weight: bold; font-size: 1.1rem;">Estructura: </label>
                <select id="tipo-estructura">
                    <option value="sencilla">Operación Libre (Cualquier forma lineal)</option>
                    <option value="division">División (Estructura Fracción)</option>
                </select>
            </div>
            
            <div class="opcion-bloque" id="area-ecuacion">
                </div>

            <button id="btn-calcular">Calcular Sustitución</button>
            <button id="btn-volver" style="background-color: #27ae60;">Volver al Inicio</button>

            <div id="resultado-box">
                <h3>Procedimiento paso a paso de examen:</h3>
                <div id="pasos-integral"></div>
            </div>
        </div>

    </div>

    <script>
        const pantallaInicio = document.getElementById('inicio');
        const pantallaCalculadora = document.getElementById('calculadora');
        const btnComenzar = document.getElementById('btn-comenzar');
        const btnVolver = document.getElementById('btn-volver');
        const btnCalcular = document.getElementById('btn-calcular');
        const resultadoBox = document.getElementById('resultado-box');
        const pasosDiv = document.getElementById('pasos-integral');
        const tipoEstructura = document.getElementById('tipo-estructura');
        const areaEcuacion = document.getElementById('area-ecuacion');

        // Memorias para almacenar las entradas del usuario al cambiar de pestaña
        let memoriaLineal = "(3x+5)^4";
        let memoriaNum = "1";
        let memoriaDen = "(3x+5)^4";

        function actualizarInterfazGrafica() {
            const tipo = tipoEstructura.value;
            
            if (document.getElementById('val-lineal')) memoriaLineal = document.getElementById('val-lineal').value;
            if (document.getElementById('val-u')) memoriaNum = document.getElementById('val-u').value;
            if (document.getElementById('val-dv')) memoriaDen = document.getElementById('val-dv').value;

            if (tipo === 'sencilla') {
                // UN SOLO CUADRO DE TEXTO LARGO CONTINUO
                areaEcuacion.innerHTML = `
                    <span class="simbolo-integral">∫</span>
                    <input type="text" id="val-lineal" class="input-unico-largo" value="${memoriaLineal}" placeholder="Ej: (3x+5)^4">
                    <span class="texto-matematico" style="margin-left: 5px;">dx</span>
                `;
            } else {
                // FORMA FRACCIONARIA CON CUADROS SEPARADOS
                areaEcuacion.innerHTML = `
                    <span class="simbolo-integral">∫</span>
                    <div class="contenedor-fraccion">
                        <div class="fila-numerador">
                            <input type="text" id="val-u" class="input-fraccion-libre" value="${memoriaNum}" placeholder="Numerador">
                        </div>
                        <div class="linea-fraccion"></div>
                        <div class="fila-denominador">
                            <input type="text" id="val-dv" class="input-fraccion-libre" value="${memoriaDen}" placeholder="Denominador">
                        </div>
                    </div>
                    <span class="texto-matematico" style="margin-left: 10px;">dx</span>
                `;
            }
            activarFiltroSeguridad();
        }

        // Blindaje anti-letras raras
        function activarFiltroSeguridad() {
            const inputs = [document.getElementById('val-lineal'), document.getElementById('val-u'), document.getElementById('val-dv')];
            inputs.forEach(input => {
                if (input) {
                    input.addEventListener('input', (e) => {
                        e.target.value = e.target.value.replace(/[^0-9a-zA-Z\^\+\-\(\)]/g, '');
                    });
                }
            });
        }

        tipoEstructura.addEventListener('change', () => {
            actualizarInterfazGrafica();
            resultadoBox.style.display = 'none';
        });

        btnComenzar.addEventListener('click', () => {
            pantallaInicio.classList.remove('active');
            pantallaCalculadora.classList.add('active');
            actualizarInterfazGrafica();
        });

        btnVolver.addEventListener('click', () => {
            pantallaCalculadora.classList.remove('active');
            pantallaInicio.classList.add('active');
            resultadoBox.style.display = 'none';
        });

        function formatearFraccion(num, den) {
            if (num % den === 0) return `${num / den}`;
            const mcd = (x, y) => y === 0 ? x : mcd(y, x % y);
            const divisor = Math.abs(mcd(num, den));
            let n = num / divisor; let d = den / divisor;
            if (d < 0) { n = -n; d = -d; }
            return `(${n}/${d})`;
        }

        // PARSEADOR Y MOTOR MATEMÁTICO DE SUSTITUCIÓN PREPA
        function procesarCadenaPotencia(cadena) {
            let limpia = cadena.toLowerCase().replace(/\s+/g, '');
            let regex = /\(([^)]+)\)\^?(-?\d+)?/;
            let coincidencia = limpia.match(regex);

            let base = limpia;
            let exponente = 1;

            if (coincidencia) {
                base = coincidencia[1];
                exponente = coincidencia[2] ? parseFloat(coincidencia[2]) : 1;
            }

            let a = 1, b = 0;
            if (base.includes('x')) {
                let partes = base.split('x');
                if (partes[0] === "") a = 1;
                else if (partes[0] === "-") a = -1;
                else a = parseFloat(partes[0]) || 1;

                if (partes[1]) {
                    b = parseFloat(partes[1].replace(/^\+/, '')) || 0;
                }
            }
            return { a, b, exponente, base };
        }

        btnCalcular.addEventListener('click', () => {
            const tipo = tipoEstructura.value;
            let datos = null;
            let simplificacionTexto = "";

            if (tipo === 'sencilla') {
                let txt = document.getElementById('val-lineal').value;
                if (!txt) { alert("Introduce una expresión lineal."); return; }
                datos = procesarCadenaPotencia(txt);
            } else {
                let num = document.getElementById('val-u').value.trim();
                let den = document.getElementById('val-dv').value.trim();
                if (!num || !den) { alert("Completa ambos campos de la fracción."); return; }
                
                // Si es fracción, analizamos el denominador y subimos el exponente con signo cambiado
                datos = procesarCadenaPotencia(den);
                datos.exponente = -datos.exponente; 
                simplificacionTexto = `<div class="paso" style="color: #0074d9; font-weight: bold;">➔ Simplificación Algebraica Previa:<br>
                Subimos el binomio del denominador al numerador invirtiendo el signo de su potencia:<br>
                ∫ [ ${num} / (${datos.base})<sup>${Math.abs(datos.exponente)}</sup> ] dx &nbsp;➔ &nbsp;∫ ${num === "1" ? "" : num}·(${datos.base})<sup>${datos.exponente}</sup> dx</div>`;
            }

            if (datos.a === 0) { alert("Coeficiente de x inválido."); return; }

            let expresionU = `${datos.a}x` + (datos.b >= 0 ? ` + ${datos.b}` : ` - ${Math.abs(datos.b)}`);
            let n = datos.exponente;

            let html = simplificacionTexto;

            // CASO LOGARÍTMICO (n = -1)
            if (n === -1) {
                let fracFuera = formatearFraccion(1, datos.a);
                html += `
                    <div class="paso"><b>Caso Especial (n = -1):</b> Produce una integral directa de tipo logaritmo ∫ (1 / u) du.</div>
                    <div class="paso"><b>Paso 1: Cambio de variable u:</b></div>
                    <div class="tabla-sustitucion">
                        <div class="variable-linea"><b>u</b> = ${expresionU}</div>
                        <div class="variable-linea"><b>du</b> = ${datos.a} dx &rarr; <b>dx</b> = du / ${datos.a}</div>
                    </div>
                    <div class="paso"><b>Paso 2: Sustitución:</b><br>
                    ∫ (1 / u) · (du / ${datos.a}) = ${fracFuera} ∫ (1 / u) du
                    </div>
                    <div class="paso"><b>Paso 3: Integración:</b><br>
                    = ${fracFuera} · ln|u| + C
                    </div>
                    <div class="paso" style="font-size: 1.3rem; margin-top: 15px; border-top: 2px dashed #000000; padding-top: 10px;">
                        <b>Resultado regresando a x:</b><br>
                        <span style="color: #27ae60; font-weight: bold;">f(x) = ${fracFuera}·ln|${expresionU}| + C</span>
                    </div>
                `;
                pasosDiv.innerHTML = html;
                resultadoBox.style.display = 'block';
                return;
            }

            // CASO GENERAL: REGLA DE LA POTENCIA
            const nuevoExponente = n + 1;
            const denominadorFinal = datos.a * nuevoExponente;
            const fraccionFinal = formatearFraccion(1, denominadorFinal);

            html += `
                <div class="paso"><b>Fórmula Base:</b> ∫ u<sup>n</sup> du = [ u<sup>(n+1)</sup> ] / (n + 1) + C</div>
                
                <div class="paso"><b>Paso 1: Identificar "u" y derivar para obtener "dx":</b></div>
                <div class="tabla-sustitucion">
                    <div class="variable-linea"><b>u</b> = ${expresionU}</div>
                    <div class="variable-linea"><b>du</b> = ${datos.a} dx &rarr; <b>dx</b> = du / ${datos.a}</div>
                </div>

                <div class="paso"><b>Paso 2: Reescribir la integral con la nueva variable u:</b><br>
                ∫ u<sup>${n}</sup> · (du / ${datos.a}) = ${formatearFraccion(1, datos.a)} ∫ u<sup>${n}</sup> du
                </div>

                <div class="paso"><b>Paso 3: Aplicar sumatoria de potencia al término:</b><br>
                = ${formatearFraccion(1, datos.a)} · [ u<sup>${nuevoExponente}</sup> / ${nuevoExponente} ] = ${fraccionFinal} · u<sup>${nuevoExponente}</sup>
                </div>

                <div class="paso" style="font-size: 1.3rem; margin-top: 15px; border-top: 2px dashed #000000; padding-top: 10px;">
                    <b>Resultado Final Estructurado:</b><br>
                    <span style="color: #27ae60; font-weight: bold;">
                        f(x) = ${fraccionFinal}·(${expresionU})<sup>${nuevoExponente}</sup> + C
                    </span>
                </div>
            `;

            pasosDiv.innerHTML = html;
            resultadoBox.style.display = 'block';
        });
    </script>
</body>
</html>
