<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Integración por Sustitución - Prepa</title>
    <style>
        /* Fondo Animado con gradiente en movimiento (Tonos Azules) */
        @keyframes fondoAnimado {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #001f3f, #0074d9, #7fdbff, #001122);
            background-size: 400% 400%;
            animation: fondoAnimado 12s ease infinite;
            color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background-color: rgba(214, 234, 248, 0.85); /* Azul traslúcido suave */
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            max-width: 650px;
            width: 90%;
            border: 3px solid #000000;
        }

        /* Botones Verde Claro */
        button {
            background-color: #2ecc71;
            color: #000000;
            border: 3px solid #000000;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px;
            box-shadow: 0 4px 0 #000000;
        }

        button:hover {
            background-color: #58d68d;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #000000;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000000;
        }

        /* Pantallas */
        .screen {
            display: none;
        }

        .active {
            display: block;
        }

        /* Pantalla de Inicio */
        #inicio h1 {
            font-size: 3.2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff;
        }

        /* Pantalla de Calculadora */
        h2.titulo-metodo {
            font-size: 2.2rem;
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        input {
            padding: 10px;
            font-size: 1.1rem;
            border: 2px solid #000000;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            background-color: #ffffff;
            color: #000000;
        }

        .opcion-bloque {
            background-color: rgba(255, 255, 255, 0.4);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px dashed #000000;
            font-size: 1.2rem;
        }

        .simbolo-integral {
            font-size: 2rem;
            vertical-align: middle;
            font-family: 'Times New Roman', Times, serif;
        }

        /* Bloque del cambio de variable u, du, dx */
        .tabla-sustitucion {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 15px 0;
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #000000;
            text-align: left;
        }

        .variable-linea {
            padding: 4px 8px;
            background: #ffffff;
            border-left: 4px solid #2ecc71; /* Detalle en verde claro */
            font-weight: bold;
        }

        /* Contenedor de Resultados */
        #resultado-box {
            margin-top: 25px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            border: 3px solid #000000;
            text-align: left;
            display: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        #resultado-box h3 {
            margin-top: 0;
            border-bottom: 2px dashed #000000;
            padding-bottom: 8px;
        }

        .paso {
            margin-bottom: 12px;
            font-size: 1.1rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="inicio" class="screen active">
            <h1>INTEGRAL POR SUSTITUCIÓN</h1>
            <button id="btn-comenzar">Calcular ya</button>
        </div>

        <div id="calculadora" class="screen">
            <h2 class="titulo-metodo">INTEGRAL POR SUSTITUCIÓN</h2>
            
            <p>Introduce los parámetros para la estructura: <b>∫ (a·x + b)^n dx</b></p>
            
            <div class="opcion-bloque">
                <span class="simbolo-integral">∫</span>
                <span> ( </span>
                <input type="number" id="val-a" value="3" style="width: 50px;" placeholder="a">
                <span>x + </span>
                <input type="number" id="val-b" value="5" style="width: 50px;" placeholder="b">
                <span> )^<input type="number" id="val-n" value="4" style="width: 45px;" placeholder="n"> dx</span>
            </div>

            <button id="btn-calcular">Calcular Sustitución</button>
            <button id="btn-volver" style="background-color: #27ae60;">Volver</button>

            <div id="resultado-box">
                <h3>Procedimiento paso a paso:</h3>
                <div id="pasos-integral"></div>
            </div>
        </div>

    </div>

    <script>
        // Navegación entre pantallas
        const pantallaInicio = document.getElementById('inicio');
        const pantallaCalculadora = document.getElementById('calculadora');
        const btnComenzar = document.getElementById('btn-comenzar');
        const btnVolver = document.getElementById('btn-volver');
        const btnCalcular = document.getElementById('btn-calcular');
        const resultadoBox = document.getElementById('resultado-box');
        const pasosDiv = document.getElementById('pasos-integral');

        btnComenzar.addEventListener('click', () => {
            pantallaInicio.classList.remove('active');
            pantallaCalculadora.classList.add('active');
        });

        btnVolver.addEventListener('click', () => {
            pantallaCalculadora.classList.remove('active');
            pantallaInicio.classList.add('active');
            resultadoBox.style.display = 'none';
        });

        // Función para simplificar texto de fracciones
        function formatearFraccion(num, den) {
            if (num % den === 0) {
                return `${num / den}`;
            }
            const mcd = (x, y) => y === 0 ? x : mcd(y, x % y);
            const divisor = Math.abs(mcd(num, den));
            let n = num / divisor;
            let d = den / divisor;
            if (d < 0) { n = -n; d = -d; }
            return `(${n}/${d})`;
        }

        // Motor matemático de Cambio de Variable / Sustitución
        btnCalcular.addEventListener('click', () => {
            const a = parseFloat(document.getElementById('val-a').value || 1);
            const b = parseFloat(document.getElementById('val-b').value || 0);
            const n = parseFloat(document.getElementById('val-n').value || 1);

            if (a === 0) {
                alert("El coeficiente 'a' no puede ser 0 para un cambio de variable lineal.");
                return;
            }

            let expresionU = `${a}x` + (b >= 0 ? ` + ${b}` : ` - ${Math.abs(b)}`);

            if (n === -1) {
                let fracFuera = formatearFraccion(1, a);

                let html = `
                    <div class="paso"><b>Caso Especial (n = -1):</b> La expresión equivale a una fracción del tipo ∫ 1/u du.</div>
                    <div class="paso"><b>Paso 1: Definir el cambio de variable:</b></div>
                    <div class="tabla-sustitucion">
                        <div class="variable-linea"><b>u</b> = ${expresionU}</div>
                        <div class="variable-linea"><b>du</b> = ${a} dx &rarr; <b>dx</b> = du / ${a}</div>
                    </div>
                    <div class="paso"><b>Paso 2: Sustituir en la integral original:</b><br>
                    ∫ (1 / u) · (du / ${a}) = ${fracFuera} ∫ (1 / u) du
                    </div>
                    <div class="paso"><b>Paso 3: Integrar directamente:</b><br>
                    = ${fracFuera} · ln|u| + C
                    </div>
                `;

                html += `
                    <div class="paso" style="font-size: 1.3rem; margin-top: 15px; border-top: 2px dashed #000000; padding-top: 10px;">
                        <b>Resultado regresando a la variable x:</b><br>
                        <span style="color: #27ae60; font-weight: bold;">
                            f(x) = ${fracFuera} · ln|${expresionU}| + C
                        </span>
                    </div>
                `;
                pasosDiv.innerHTML = html;
                resultadoBox.style.display = 'block';
                return;
            }

            // Caso general con signo "^" explícito
            const nuevoExponente = n + 1;
            const denominadorFinal = a * nuevoExponente;
            const fraccionFinal = formatearFraccion(1, denominadorFinal);

            let html = `
                <div class="paso"><b>Fórmula general de potencia:</b> ∫ u^n du = [ u^(n+1) ] / (n + 1) + C</div>
                
                <div class="paso"><b>Paso 1: Elegir la variable "u" y calcular su derivada (du):</b></div>
                <div class="tabla-sustitucion">
                    <div class="variable-linea"><b>u</b> = ${expresionU}</div>
                    <div class="variable-linea"><b>du</b> = ${a} dx</div>
                    <div class="variable-linea"><b>Despejando dx:</b> dx = du / ${a}</div>
                </div>

                <div class="paso"><b>Paso 2: Reescribir la integral en términos de "u":</b><br>
                ∫ u^${n} · (du / ${a}) = ${formatearFraccion(1, a)} ∫ u^${n} du
                </div>

                <div class="paso"><b>Paso 3: Aplicar la regla de la potencia a la variable u:</b><br>
                = ${formatearFraccion(1, a)} · [ u^${nuevoExponente} / ${nuevoExponente} ]<br>
                = u^${nuevoExponente} / (${a} × ${nuevoExponente}) = ${fraccionFinal} · u^${nuevoExponente}
                </div>
            `;

            html += `
                <div class="paso" style="font-size: 1.3rem; margin-top: 15px; border-top: 2px dashed #000000; padding-top: 10px;">
                    <b>Resultado regresando a la variable x:</b><br>
                    <span style="color: #27ae60; font-weight: bold;">
                        f(x) = ${fraccionFinal} · (${expresionU})^${nuevoExponente} + C
                    </span>
                </div>
            `;

            pasosDiv.innerHTML = html;
            resultadoBox.style.display = 'block';
        });
    </script>
</body>
</html>
